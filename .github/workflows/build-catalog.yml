name: Build Gaia star catalog

on:
  workflow_dispatch:
  schedule:
    - cron: "23 3 1 */3 *"

permissions:
  contents: write

jobs:
  build-catalog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rebuild catalog from Gaia Archive
        run: python scripts/build_catalog.py --max-distance-ly 150 --max-g-mag 14 --min-parallax-over-error 20 --output data/star-catalog.json

      - name: Commit updated catalog
        run: |
          if git diff --quiet -- data/star-catalog.json; then
            echo "Catalog unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/star-catalog.json
          git commit -m "Update Gaia star catalog"
          git push
