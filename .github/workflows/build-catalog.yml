name: Build Gaia star catalog

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-catalog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rebuild catalog from Gaia Archive
        run: python scripts/build_catalog.py --max-distance-ly 150 --max-g-mag 14 --min-parallax-over-error 20 --output data/star-catalog.json

      - name: Upload rebuilt catalog
        uses: actions/upload-artifact@v4
        with:
          name: star-catalog
          path: data/star-catalog.json
