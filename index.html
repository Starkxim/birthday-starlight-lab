<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>生日星光生成器</title>
  <meta name="description" content="输入出生日期，寻找生日那一刻出发、在未来生日附近抵达地球的恒星光。">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <canvas id="starscape" aria-hidden="true"></canvas>

  <div class="app">
    <header class="site-header">
      <div class="topbar">
        <div>
          <p class="eyebrow">Gaia DR3 nearby star archive</p>
          <h1>生日星光生成器</h1>
          <p class="subtitle">让一束在你出生时离开恒星的光，在未来某个生日夜抵达你的相机。</p>
        </div>
        <div class="catalog-status" id="catalogStatus">载入星表中</div>
      </div>
    </header>

    <main class="layout">
      <section class="control-panel" aria-labelledby="formTitle">
        <div class="section-heading">
          <p class="eyebrow">Input</p>
          <h2 id="formTitle">你的生日光参数</h2>
        </div>

        <form id="birthForm" class="form-grid">
          <label>
            <span>出生日期</span>
            <input id="birthDate" type="date" required>
          </label>

          <label>
            <span>出生时间</span>
            <input id="birthTime" type="time" value="12:00">
          </label>

          <label>
            <span>出生/观测时区</span>
            <select id="timeZoneOffset">
              <option value="8" selected>UTC+8 中国时间</option>
              <option value="9">UTC+9 日本/韩国</option>
              <option value="0">UTC+0</option>
              <option value="-5">UTC-5 美东标准时</option>
              <option value="-8">UTC-8 美西标准时</option>
            </select>
          </label>

          <label>
            <span>观测地点</span>
            <select id="locationPreset">
              <option value="hefei" selected>合肥</option>
              <option value="anqing">安庆</option>
              <option value="beijing">北京</option>
              <option value="shanghai">上海</option>
              <option value="guangzhou">广州</option>
              <option value="chengdu">成都</option>
              <option value="custom">自定义坐标</option>
            </select>
          </label>

          <div class="coord-row">
            <label>
              <span>纬度</span>
              <input id="latitude" type="number" step="0.0001" value="31.8206">
            </label>
            <label>
              <span>经度</span>
              <input id="longitude" type="number" step="0.0001" value="117.2272">
            </label>
          </div>

          <label>
            <span>设备档位</span>
            <select id="equipment">
              <option value="telephoto" selected>相机长焦/轻量赤道仪</option>
              <option value="visual">肉眼/双筒优先</option>
              <option value="tracker">小望远镜/堆栈拍摄</option>
              <option value="deep">进阶民用设备</option>
            </select>
          </label>

          <label>
            <span>未来年份数</span>
            <input id="horizon" type="number" min="5" max="50" value="20">
          </label>

          <button class="primary-action" type="submit">生成生日星光</button>
        </form>

        <div class="method-note">
          <p>星表预计算自 Gaia DR3，不会在访客打开页面时实时请求 Gaia。天气只适合在目标日期前约 16 天内查询；多年后的云量、透明度和月相需要临近再确认。</p>
        </div>
      </section>

      <section class="results-panel" aria-live="polite">
        <div class="section-heading">
          <p class="eyebrow">Timeline</p>
          <h2>未来生日窗口</h2>
        </div>
        <div id="summary" class="summary-box">等待输入生日。</div>
        <div id="timeline" class="timeline"></div>
      </section>

      <section class="detail-panel" aria-labelledby="detailTitle">
        <div class="section-heading">
          <p class="eyebrow">Target</p>
          <h2 id="detailTitle">候选恒星详情</h2>
        </div>
        <div id="candidateTabs" class="candidate-tabs"></div>
        <article id="detail" class="detail-card">
          <p class="empty-state">生成后选择一个年份和候选星。</p>
        </article>
        <canvas id="skyChart" class="sky-chart" width="720" height="420" aria-label="目标恒星方位示意图"></canvas>
      </section>
    </main>
  </div>

  <script src="assets/app.js"></script>
</body>
</html>
